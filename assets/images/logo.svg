<svg width="280" height="70" viewBox="0 0 280 70" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Shape -->
    <rect x="5" y="10" width="50" height="50" rx="14" fill="url(#gradient-blue)" filter="url(#shadow)" />
    
    <!-- Flow Lines -->
    <path d="M17 35 L30 20 L43 45 L53 30" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="17" cy="35" r="4" fill="white" filter="url(#glow)"/>
    <circle cx="53" cy="30" r="4" fill="white" filter="url(#glow)"/>
    
    <!-- Text - Properly positioned with more right margin -->
    <text x="70" y="50" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="url(#gradient-blue-text)">LifeFlow</text>
    
    <defs>
        <!-- Blue gradient for icon -->
        <linearGradient id="gradient-blue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4dabf7"/>
            <stop offset="100%" stop-color="#228be6"/>
        </linearGradient>
        
        <!-- Blue gradient for text -->
        <linearGradient id="gradient-blue-text" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4dabf7"/>
            <stop offset="100%" stop-color="#228be6"/>
        </linearGradient>
        
        <!-- Shadow filter -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
        </filter>
        
        <!-- Glow filter -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
</svg>